@if (activeDialog(); as dialog) {
  <div class="dialog-backdrop" (click)="dialog.dismissible ? cancel() : null">
    <div
      class="dialog"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="dialog.title"
      (click)="$event.stopPropagation()"
    >
      <h2 class="dialog__title">{{ dialog.title }}</h2>
      <p class="dialog__message">{{ dialog.message }}</p>

      <div class="dialog__actions">
        <button class="dialog__button dialog__button--secondary" type="button" (click)="cancel()">
          {{ dialog.cancelText }}
        </button>
        <button class="dialog__button dialog__button--primary" type="button" (click)="confirm()">
          {{ dialog.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
