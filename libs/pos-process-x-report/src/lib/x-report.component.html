<lib-process-content-layout [title]="'X-Report (Current Shift)'"><div slot="content"><div class="totals"><div><strong>Money In:</strong> {{ moneyIn | currency }}</div><div><strong>Money Out:</strong> {{ moneyOut | currency }}</div></div><h3>Payments (Current Shift)</h3><div class="payments-list"><div *ngFor="let payment of payments()" class="payment-row"><span>{{ payment.timestamp | date:'short' }}</span><span>{{ payment.method }}</span><span [ngClass]="payment.direction">{{ payment.amount | currency }}</span></div></div></div><div slot="nav-buttons"><button (click)="done()">Done</button></div></lib-process-content-layout>
